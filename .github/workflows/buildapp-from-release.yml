name: Build sideloaded IPA from Release Assets

on:
    workflow_dispatch:
        inputs:
            build_sideload:
                description: "Build normal sideload IPA (zxPluginsInject + ipapatch)"
                default: true
                required: false
                type: boolean
            build_noplugins:
                description: "Build no-plugins IPA (NoPluginsPatch, any sideloader)"
                default: false
                required: false
                type: boolean
            decrypted_instagram_url:
                description: "Direct URL to the decrypted Instagram IPA"
                default: ""
                required: true
                type: string
            target:
                description: "IG target"
                default: "434"
                required: false
                type: choice
                options:
                    - "434"
                    - "410"
            release_tag:
                description: "Release tag to pull assets from"
                default: ""
                required: false
                type: string
            upload_artifact:
                description: "Upload artifact"
                default: true
                required: false
                type: boolean

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    UPSTREAM_REPO: faroukbmiled/RyukGram
    HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

jobs:
    build:
        name: Build RyukGram from Release
        runs-on: macos-latest
        permissions:
            contents: read

        steps:
            - name: Validate selection
              run: |
                if [ "${{ inputs.build_sideload }}" != "true" ] && \
                   [ "${{ inputs.build_noplugins }}" != "true" ]; then
                  echo "::error::Select at least one of build_sideload / build_noplugins."
                  exit 1
                fi

            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Dependencies
              run: brew install dpkg

            - name: Install IPA tooling
              run: |
                pip install --force-reinstall https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
                mkdir -p "$HOME/.local/bin"
                curl -fLo "$HOME/.local/bin/ipapatch" https://github.com/asdfzxcvbn/ipapatch/releases/download/v2.1.3/ipapatch.macos-arm64
                chmod +x "$HOME/.local/bin/ipapatch"
                echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Resolve release tag
              id: tag
              env:
                GH_TOKEN: ${{ github.token }}
                INPUT_TAG: ${{ inputs.release_tag }}
                INPUT_TARGET: ${{ inputs.target }}
              run: |
                if [ -n "$INPUT_TAG" ]; then
                  TAG="$INPUT_TAG"
                else
                  TAG="$(gh release view --repo "$UPSTREAM_REPO" --json tagName -q .tagName)"
                fi
                echo "TAG=${TAG}" >> "$GITHUB_ENV"
                echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

            - name: Download release assets (robust curl)
              env:
                GH_TOKEN: ${{ github.token }}
              run: |
                mkdir -p packages
                # Use -H "Accept: application/octet-stream" to ensure binary download
                # Use -f to fail on 404s and -L to follow redirects
                URL_BASE="https://github.com/$UPSTREAM_REPO/releases/download/$TAG"
                
                curl -fL -H "Accept: application/octet-stream" -o packages/RyukGram_1.3.2_rootless.deb "$URL_BASE/RyukGram_1.3.2_rootless.deb"
                curl -fL -H "Accept: application/octet-stream" -o packages/zxPluginsInject_v1.3.2.dylib "$URL_BASE/zxPluginsInject_v1.3.2.dylib"
                curl -fL -H "Accept: application/octet-stream" -o packages/NoPluginsPatch_v1.3.2.dylib "$URL_BASE/NoPluginsPatch_v1.3.2.dylib"
                
                # Verification: Ensure it's not an HTML page
                if grep -q "<!DOCTYPE html>" packages/RyukGram_1.3.2_rootless.deb; then
                  echo "::error::Downloaded file is an HTML page, not a .deb binary."
                  exit 1
                fi
                
                echo "DEB=packages/RyukGram_1.3.2_rootless.deb" >> "$GITHUB_ENV"
                echo "ZX_DYLIB=packages/zxPluginsInject_v1.3.2.dylib" >> "$GITHUB_ENV"
                echo "NP_DYLIB=packages/NoPluginsPatch_v1.3.2.dylib" >> "$GITHUB_ENV"

            - name: Extract dylib + bundle
              run: |
                STAGE="$(mktemp -d)"
                dpkg-deb -x "$DEB" "$STAGE"
                # ... (rest of your existing extraction logic remains the same)
